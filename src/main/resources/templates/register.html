<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng Ký Tài Khoản - Bus Ticket Pro</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; padding: 5px; }
        .register-container { background: white; padding: 30px; border-radius: 8px; max-width: 400px; margin: 50px auto; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn { width: 100%; padding: 10px; background-color: #28a745; border: none; border-radius: 4px; color: white; font-weight: bold; cursor: pointer; }
        .error-msg { color: red; font-size: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="register-container">
    <h2>📝 Đăng Ký Thành Viên</h2>

    <div th:if="${error}" class="error-msg" th:text="${error}"></div>

    <form th:action="@{/register}" th:object="${user}" method="post">
        <div class="form-group">
            <label>Tên đăng nhập:</label>
            <input type="text" th:field="*{username}" required placeholder="Nhập tên tài khoản">
        </div>

        <div class="form-group">
            <label>Mật khẩu:</label>
            <input type="password" th:field="*{password}" required placeholder="Nhập mật khẩu an toàn">
        </div>

        <div class="form-group">
            <label>Họ và tên:</label>
            <input type="text" th:field="*{fullName}" required placeholder="Nhập đầy đủ họ tên">
        </div>

        <div class="form-group">
            <label>Số điện thoại:</label>
            <input type="text" th:field="*{phone}" required placeholder="Nhập số điện thoại liên hệ">
        </div>

        <div class="form-group">
            <label>Địa chỉ Email:</label>
            <input type="email" th:field="*{email}" required placeholder="VD: nguyenvanan@gmail.com">
        </div>

        <div class="form-group">
            <label>Địa chỉ thường trú:</label>
            <input type="text" th:field="*{address}" placeholder="Nhập tỉnh/thành, quận/huyện đang ở">
        </div>

        <button type="submit" class="btn">ĐĂNG KÝ NGAY</button>
    </form>

    <p style="text-align: center; margin-top: 15px;">
        Đã có tài khoản? <a th:href="@{/login}">Đăng nhập tại đây</a>
    </p>
</div>

</body>
</html>
