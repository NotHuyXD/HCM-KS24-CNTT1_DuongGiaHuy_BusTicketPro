<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng Nhập - Bus Ticket Pro</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; padding: 5px; }
        .login-container { background: white; padding: 30px; border-radius: 8px; max-width: 400px; margin: 50px auto; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        input:focus { border-color: #007bff; outline: none; box-shadow: 0 0 5px rgba(0,123,255,0.25); }

        .btn { width: 100%; padding: 12px; background-color: #007bff; border: none; border-radius: 4px; color: white; font-weight: bold; font-size: 14px; cursor: pointer; transition: 0.2s; }
        .btn:hover { background-color: #0056b3; }

        .alert { padding: 10px; border-radius: 4px; margin-bottom: 15px; font-size: 14px; text-align: center; font-weight: bold; }
        .alert-error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .alert-success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }

        .links { text-align: center; margin-top: 20px; font-size: 14px; }
        .links a { color: #007bff; text-decoration: none; font-weight: bold; }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="login-container">
    <h2 style="text-align: center; margin-bottom: 20px; color: #2c3e50;">🔐 Bus Ticket Pro</h2>

    <div th:if="${param.error}" class="alert alert-error">
        Sai tên đăng nhập hoặc mật khẩu!
    </div>

    <div th:if="${param.logout}" class="alert alert-success">
        Bạn đã đăng xuất thành công.
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label>Tên đăng nhập:</label>
            <input type="text" name="username" required placeholder="Nhập tên tài khoản">
        </div>

        <div class="form-group">
            <label>Mật khẩu:</label>
            <input type="password" name="password" required placeholder="Nhập mật khẩu">
        </div>

        <button type="submit" class="btn">ĐĂNG NHẬP</button>
    </form>

    <div class="links">
        <p>Chưa có tài khoản? <a th:href="@{/register}">Đăng ký ngay</a></p>
        <p style="margin-top: 10px;"><a th:href="@{/}" style="color: #6c757d; font-weight: normal;">⬅ Quay lại Trang chủ</a></p>
    </div>
</div>

</body>
</html>
