<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lịch Sử Đặt Vé</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f8f9fa; padding: 30px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #343a40; color: white; }
        .alert { padding: 12px; margin-bottom: 15px; border-radius: 4px; font-weight: bold; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎟 Lịch Sử Đặt Vé Của Bạn</h2>
    <a th:href="@{/}" style="color: #007bff; text-decoration: none;">⬅ Quay lại trang chủ</a>

    <div th:if="${success}" class="alert success" th:text="${success}" style="margin-top: 15px;"></div>
    <div th:if="${error}" class="alert error" th:text="${error}" style="margin-top: 15px;"></div>

    <table>
        <thead>
        <tr>
            <th>Mã Vé</th>
            <th>Tuyến Đường</th>
            <th>Biển Số (Ghế)</th>
            <th>Giờ Đặt</th>
            <th>Trạng Thái</th>
            <th>Thao Tác</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="t : ${myTickets}">
            <td th:text="${t.ticketCode}" style="font-weight: bold; color: #007bff;"></td>
            <td th:text="${t.seat.bus.route.startLocation} + ' ➔ ' + ${t.seat.bus.route.endLocation}"></td>
            <td th:text="${t.seat.bus.plateNumber} + ' (' + ${t.seat.seatName} + ')'"></td>
            <td th:text="${#temporals.format(t.bookingTime, 'dd-MM-yyyy HH:mm')}"></td>
            <td style="font-weight: bold;" th:text="${t.status}"></td>
            <td>
                <form th:if="${t.status.name() != 'CANCELLED'}" th:action="@{/cancel-ticket/{id}(id=${t.id})}" method="post">
                    <button type="submit" style="background: #dc3545; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer;" onclick="return confirm('Bạn chắc chắn muốn hủy vé này?');">Hủy Vé</button>
                </form>
                <span th:if="${t.status.name() == 'CANCELLED'}" style="color: #999;">Đã hủy</span>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
