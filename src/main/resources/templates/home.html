<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Trang Chủ - Bus Ticket Pro</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f8f9fa; margin: 0; }
        header { background: #343a40; color: white; padding: 15px 30px; display: flex; justify-content: space-between; }
        .main-content { max-width: 900px; margin: 30px auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .search-box { background: #007bff; padding: 20px; border-radius: 8px; color: white; margin-bottom: 20px;}
        input { padding: 10px; border-radius: 4px; border: none; margin-right: 10px; width: 30%; }
        button { padding: 10px 20px; background: #ffc107; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .bus-card { border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center;}
        .alert { padding: 12px; margin-bottom: 15px; border-radius: 4px; font-weight: bold; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<header>
    <h2>🚌 Bus Ticket Pro</h2>
    <div>
        <span th:if="${#request.userPrincipal != null}">
            Xin chào, <b th:text="${#request.userPrincipal.name}"></b>!
            <a th:href="@{/my-tickets}" style="color: #ffc107; margin: 0 15px;">🎟 Vé của tôi</a>
            <a th:href="@{/logout}" style="color: white;">Đăng xuất</a>
        </span>
        <span th:if="${#request.userPrincipal == null}">
            <a th:href="@{/login}" style="color: white;">Đăng nhập</a> | <a th:href="@{/register}" style="color: white;">Đăng ký</a>
        </span>
    </div>
</header>

<div class="main-content">
    <div th:if="${success}" class="alert success" th:text="${success}"></div>
    <div th:if="${error}" class="alert error" th:text="${error}"></div>

    <div class="search-box">
        <h3>🔍 Tìm kiếm chuyến xe</h3>
        <form th:action="@{/search-bus}" method="get">
            <input type="text" name="start" required placeholder="Điểm đi (VD: Hà Nội)" th:value="${start}">
            <input type="text" name="end" required placeholder="Điểm đến (VD: Hải Phòng)" th:value="${end}">
            <button type="submit">TÌM CHUYẾN</button>
        </form>
    </div>

    <div th:if="${buses != null}">
        <h3>Kết quả tìm kiếm:</h3>
        <div th:if="${#lists.isEmpty(buses)}"><p>Không tìm thấy chuyến xe nào phù hợp!</p></div>

        <div th:each="bus : ${buses}" class="bus-card">
            <div>
                <h4 style="margin:0; color:#007bff;" th:text="${bus.route.startLocation} + ' ➔ ' + ${bus.route.endLocation}"></h4>
                <p style="margin:5px 0;">Biển số: <b th:text="${bus.plateNumber}"></b> | Loại: <span th:text="${bus.busType}"></span></p>
                <p style="margin:0; color: green; font-weight: bold;" th:text="'Giá vé: ' + ${#numbers.formatDecimal(bus.route.basePrice, 0, 'COMMA', 0, 'POINT')} + ' đ'"></p>
            </div>
            <a th:href="@{/bus/{id}/seats(id=${bus.id})}" style="background: #28a745; color: white; padding: 10px 15px; text-decoration: none; border-radius: 4px; font-weight: bold;">CHỌN GHẾ</a>
        </div>
    </div>
</div>

</body>
</html>
